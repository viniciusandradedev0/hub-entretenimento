<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hub centralizado de fontes gratuitas e legais de entretenimento — filmes, música, podcasts, jogos e documentários." />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Hub de Entretenimento Pessoal</title>

    <link rel="preconnect" href="https://www.google.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.google.com" />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />

    <!-- Anti-flash: aplica o tema antes do CSS para evitar flash branco no modo escuro -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-background text-gray-900 dark:text-text">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
